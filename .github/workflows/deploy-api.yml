# ============================================================
# 后端 API 部署 - Cloudflare Workers
# 对应文档 13.1 当前架构 / 13.3 部署配置
# ============================================================
name: Deploy API to Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - "music-player/backend/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: music-player/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: music-player/backend

      - name: Deploy to Cloudflare Workers (Production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: music-player/backend
          command: deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # 数据库迁移（手动触发）
  db-migrate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: music-player/backend
    if: github.event_name == 'workflow_dispatch'
    needs: []
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize D1 Database (Production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: music-player/backend
          command: d1 execute music-player-db-prod --file=./schema.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
