# ============================================================
# 音乐播放器后端 - Cloudflare Worker 部署配置
# 对应文档 13.3 部署配置
# ============================================================

name = "music-player-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# 环境变量（对应文档 13.3）
[vars]
ENVIRONMENT = "development"

# ---- D1 数据库绑定（模块10：数据库设计） ----
[[d1_databases]]
binding = "DB"
database_name = "music-player-db"
database_id = "YOUR_D1_DATABASE_ID"

# ---- KV 缓存绑定（模块11：缓存策略） ----
[[kv_namespaces]]
binding = "CACHE"
id = "YOUR_KV_NAMESPACE_ID"

# ============================================================
# 生产环境配置（对应文档 13.3 生产规划）
# ============================================================
[env.production]
name = "music-player-api-prod"
vars = { ENVIRONMENT = "production" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "music-player-db-prod"
database_id = "YOUR_PROD_D1_DATABASE_ID"

# ---- KV 缓存绑定（生产环境） ----
[[env.production.kv_namespaces]]
binding = "CACHE"
id = "YOUR_PROD_KV_NAMESPACE_ID"

# ---- 路由配置（自定义域名） ----
# [[routes]]
# pattern = "api.example.com/*"
# zone_name = "example.com"
